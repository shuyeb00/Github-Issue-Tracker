<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

    <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-gray-100 min-h-screen">

    <div id="login-page" class="min-h-screen flex items-center justify-center bg-gray-100">
        <div class="bg-white rounded-2xl shadow-lg p-10 w-full max-w-md">

            <div class="text-center mb-8">
                <div class="flex justify-center mb-3">
                    <img src="assets/github-logo.png" alt="" class="w-16 h-16" />
                </div>
                <h1 class="text-3xl font-bold text-gray-900">GitHub Issue Tracker</h1>
                <p class="text-gray-600 mt-2 text-sm">Sign in to manage issues</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-800 mb-1">Username</label>
                    <input id="username-input" type="text" placeholder="Enter username"
                        class="input input-bordered w-full" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input id="password-input" type="password" placeholder="Enter password"
                        class="input input-bordered w-full" />
                </div>

                <p id="login-error" class="text-red-500 text-sm hidden">
                    Invalid username or password!
                </p>

                <button onclick="handleLogin()" class="btn btn-neutral w-full">
                    <i class="fa-solid fa-right-to-bracket mr-2"></i> Sign In
                </button>
            </div>

            <div class="mt-6 bg-gray-50 rounded-xl p-4 text-sm border border-gray-200">
                <p class="font-semibold text-gray-700 mb-1">
                    Demo Credentials
                </p>
                <p class="text-gray-600">Username: <span class="font-mono font-bold text-gray-800">admin</span></p>
                <p class="text-gray-600">Password: <span class="font-mono font-bold text-gray-800">admin123</span></p>
            </div>

        </div>
    </div>

    <div id="main-page" class="hidden">

        <nav class="bg-white shadow-md sticky top-0 z-50 px-6 py-4">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">

                <div class="flex items-center gap-3">
                    <img src="assets/github-logo.png" alt="Logo" class="w-8 h-8" />
                    <span class="text-xl font-bold text-gray-800">GitHub Issue Tracker</span>
                </div>

                <div class="flex items-center gap-2 w-full md:w-auto">
                    <input id="search-input" type="text" placeholder="Search issues..."
                        class="input input-bordered w-full md:w-72" />
                    <button onclick="handleSearch()" class="btn btn-neutral">
                        <i class="fa-solid fa-magnifying-glass"></i> Search
                    </button>
                </div>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto px-4 py-8">
            <div class="bg-white rounded-2xl shadow-sm p-6">

                <div class="flex gap-3 mb-6">
                    <button id="tab-all" onclick="changeTab('all')" class="tab-btn btn btn-outline">All</button>
                    <button id="tab-open" onclick="changeTab('open')" class="tab-btn btn btn-outline">Open</button>
                    <button id="tab-closed" onclick="changeTab('closed')"
                        class="tab-btn btn btn-outline">Closed</button>
                </div>

                <div
                    class="flex items-center justify-between bg-gray-50 rounded-xl px-5 py-3 mb-6 border border-gray-200">
                    <div class="flex items-center gap-2 text-gray-700">
                        <i class="fa-solid fa-list text-gray-400"></i>
                        <span id="issue-count-text" class="font-medium text-sm">Loading...</span>
                    </div>
                    <div class="flex items-center gap-4 text-sm font-semibold">
                        <span class="text-green-600 flex items-center gap-1">
                            <i class="fa-solid fa-circle-dot"></i>
                            <span id="open-count">0</span> Open
                        </span>
                        <span class="text-purple-600 flex items-center gap-1">
                            <i class="fa-solid fa-circle-check"></i>
                            <span id="closed-count">0</span> Closed
                        </span>
                    </div>
                </div>

                <div id="loading-spinner" class="hidden flex justify-center items-center py-20">
                    <span class="loading loading-spinner loading-lg"></span>
                </div>

                <div id="issue-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5"></div>

            </div>
        </div>
    </div>


    <div id="issue-modal" class="modal-overlay hidden">
        <div class="modal-backdrop" onclick="closeModal()"></div>

        <div class="modal-box-custom">
            <div id="modal-spinner" class="hidden flex justify-center items-center py-16">
                <span class="loading loading-spinner loading-lg"></span>
            </div>
            <div id="modal-content"></div>
        </div>
    </div>


    <script src="script.js"></script>
</body>

</html>
